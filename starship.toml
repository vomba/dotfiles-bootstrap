"$schema" = 'https://starship.rs/config-schema.json'

[username]
show_always = true
style_user = "bg:#BA1861"
style_root = "bg:#BA1861"
format = '[$user ]($style)'

[directory]
style = "bg:#DB4678"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ÔĄē "
